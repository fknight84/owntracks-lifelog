name: Build Lifelog APK

on:
  push:
    branches: [ master, lifelog ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Decode signing keystore
        run: echo "${{ secrets.LIFELOG_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/lifelog.keystore"

      - name: Build GMS debug APK (Google Maps, fixed signing)
        working-directory: project
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          LIFELOG_KEYSTORE_FILE: ${{ runner.temp }}/lifelog.keystore
          LIFELOG_KEYSTORE_PASSWORD: ${{ secrets.LIFELOG_KEYSTORE_PASSWORD }}
          LIFELOG_KEY_ALIAS: ${{ secrets.LIFELOG_KEY_ALIAS }}
          LIFELOG_KEY_PASSWORD: ${{ secrets.LIFELOG_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleGmsDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: owntracks-gms-debug
          path: project/app/build/outputs/apk/gms/debug/*.apk
          if-no-files-found: error
